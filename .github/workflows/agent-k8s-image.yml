name: Agent k8s image

on:
  push:
    branches: [main]
    paths:
      # Anything that changes the k8s-flavor binary.
      - "agent/**"
      - "shared/**"
      - "Dockerfile.agent.k8s"
      # Bumps the chart's appVersion / pinned image tag.
      - "helm/**"
      # The workflow itself.
      - ".github/workflows/agent-k8s-image.yml"
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: agent-k8s-image
  cancel-in-progress: false

env:
  REGISTRY: hrbr.sppidy.in
  IMAGE_NAME: sys-manager/agent-k8s

jobs:
  build-and-push:
    name: Build + push (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch submodules with PAT
        env:
          SUBMODULES_PAT: ${{ secrets.SUBMODULES_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${SUBMODULES_PAT:-}" ]; then
            git config --global \
              url."https://x-access-token:${SUBMODULES_PAT}@github.com/".insteadOf \
              "https://github.com/"
          fi
          git submodule update --init --recursive --depth 1 agent shared

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_SECRET }}

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          SHA_SHORT=$(echo "$GITHUB_SHA" | cut -c1-7)
          TAGS=("${REGISTRY}/${IMAGE_NAME}:sha-${SHA_SHORT}")
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF##refs/tags/}"
            TAGS+=("${REGISTRY}/${IMAGE_NAME}:${VER}")
            TAGS+=("${REGISTRY}/${IMAGE_NAME}:latest")
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            TAGS+=("${REGISTRY}/${IMAGE_NAME}:main")
            TAGS+=("${REGISTRY}/${IMAGE_NAME}:latest")
          fi
          # docker/build-push-action wants newline-separated tags.
          {
            echo 'tags<<EOF'
            for t in "${TAGS[@]}"; do echo "$t"; done
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.agent.k8s
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # Build cache: registry-backed so amd64 + arm64 share layers
          # across runs. The cache image is small and cheap to keep.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          provenance: false
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=sys-manager-agent-k8s
            org.opencontainers.image.description=sys-manager k8s agent — kube-rs client behind the same WS protocol as the host agent

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Pushed tags"
            echo
            echo '```'
            echo "${{ steps.tags.outputs.tags }}"
            echo '```'
            echo
            echo "Pull with:"
            echo
            echo "    docker pull ${REGISTRY}/${IMAGE_NAME}:latest"
          } >> "$GITHUB_STEP_SUMMARY"
