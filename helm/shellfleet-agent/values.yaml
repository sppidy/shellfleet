# shellfleet-agent — Helm values
#
# CE chart. The defaults install a read-only agent that can list pods,
# describe resources, and tail logs. Flip `rbac.exec` for `kubectl exec`,
# `rbac.write` once slice 6 / EE adds apply+scale.

# Container image. CI publishes multi-arch images to GHCR on every
# k8s-related commit to main. Build locally via
# `docker build -f Dockerfile.agent.k8s` at the super-repo root and
# point this elsewhere if you'd rather host it yourself.
image:
  repository: ghcr.io/sppidy/shellfleet/agent-k8s
  tag: ""           # default to .Chart.appVersion (see Chart.yaml)
  pullPolicy: IfNotPresent
imagePullSecrets: []

# How the agent reaches the dashboard. Match these to your deploy.
# `serverApiUrl` is for HTTPS (device-auth pairing); `serverWsUrl` is the
# WebSocket the agent uses to receive commands. Both are required.
server:
  apiUrl: "https://dashboard.example.com"
  wsUrl:  "wss://dashboard.example.com/agent/ws"

# Pairing token. Two paths, pick one:
#
#   1. Bootstrap via device-auth (recommended on first install). Leave
#      `existingSecret` empty and `token` unset — the agent will print a
#      one-time pairing code on first start. `kubectl logs deploy/<name>`
#      to read it, then paste at `/device` in the dashboard. The agent
#      will write the issued token back to /etc/shellfleet/agent-token.txt
#      inside the container (lost on Pod restart unless you `--from-literal`
#      it back into the secret on subsequent installs).
#
#   2. Pre-existing token. Create a Secret with key `agent-token.txt`, set
#      `existingSecret` to its name, and the chart will mount it at
#      /etc/shellfleet/agent-token.txt (read-only) via subPath so it
#      coexists with the writable /etc/shellfleet directory.
token:
  existingSecret: ""           # name of an existing Secret with key `agent-token.txt`
  # value: ""                  # ONLY if you accept committing it to values

# RBAC posture. Read-only is the safety floor — every operator gets
# this. Flip the toggles below to add capabilities.
rbac:
  # Always created — read access to pods, deployments, services,
  # ingresses, pvcs, events. Logs are also read.
  read: true

  # `kubectl exec` into pods + their stdin streams. Slice-4 feature.
  # Off by default because exec is effectively a shell on every pod.
  exec: false

  # Apply / scale / delete (slice 6 / EE — currently a no-op since
  # the agent doesn't ship apply handlers yet, but the role survives
  # to make a future enable a single-flag flip).
  write: false

# Standard k8s knobs.
replicaCount: 1
serviceAccount:
  create: true
  annotations: {}
  # Required when create=false. Empty is rejected so cluster privileges are
  # never attached to the namespace's shared default service account.
  name: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}
podLabels: {}
podAnnotations: {}

# Optional extra environment for the container — useful for things
# like RUST_LOG. Don't put secrets here; use envFrom + a Secret.
extraEnv: []
extraEnvFrom: []

# Pod-level securityContext. The defaults run the agent as a
# non-root user (UID 65532, the distroless `nonroot` convention)
# and let the kubelet chown the /etc/shellfleet emptyDir to that
# group so the agent can write its pairing token there. Override
# the whole map if you need a different UID/GID for your image.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# Container-level securityContext. Defaults strip caps and lock
# the rootfs read-only; the agent only writes to the
# /etc/shellfleet emptyDir defined in templates/deployment.yaml.
# If your image bakes in different ownership for /etc/shellfleet,
# you can flip readOnlyRootFilesystem off here.
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop: ["ALL"]

# Optional NetworkPolicy. Off by default because many small k3s
# clusters don't run a NetworkPolicy-aware CNI (the default
# flannel doesn't enforce them); flip on when you have Calico,
# Cilium, or similar in the path.
#
# When enabled the policy denies ingress (the agent only talks
# outbound) and restricts egress to:
#   - DNS in kube-system,
#   - kube-apiserver (specify your cluster's apiServer CIDR),
#   - the dashboard (TCP/443 to the configured CIDRs, or 0.0.0.0/0
#     minus the cluster pod/service CIDRs as a safety floor).
networkPolicy:
  enabled: false
  # CIDR for kube-apiserver if it's reachable at a known IP.
  # Leave empty to skip the apiserver egress rule (kube-rs uses
  # the in-cluster Service in that case, which works without an
  # explicit rule on most CNIs).
  apiServerCidr: ""
  # Pin the dashboard's reachable IP(s) here for tightest
  # egress. Example: ["203.0.113.10/32"] for a single-IP dashboard
  # (replace with your actual dashboard IP — RFC 5737 docs range).
  # Empty = allow TCP/443 to 0.0.0.0/0 minus the cluster CIDRs
  # below.
  dashboardCidrs: []
  # The cluster's pod + service CIDRs. Defaults match k3s
  # (10.42.0.0/16 pods, 10.43.0.0/16 services). Override for
  # other distributions.
  clusterCidrs: []
  # Extra raw rule blocks if you need to allow more egress (e.g.
  # an external Prometheus push gateway) or any ingress.
  extraEgress: []
  extraIngress: []
