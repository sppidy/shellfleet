name: Agent .deb

on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - "shared/**"
      # Submodule-pointer entries (160000 mode) — without these,
      # super-repo bumps that only change submodule SHAs don't
      # trigger this workflow.
      - "agent"
      - "shared"
      - ".github/workflows/agent-deb.yml"
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write
  pages: write

concurrency:
  group: agent-deb
  cancel-in-progress: false

jobs:
  build:
    name: Build .deb (${{ matrix.flavor }} · ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Standard host-agent flavor — lean .deb, no kube deps.
          - flavor: standard
            arch: amd64
            runner: ubuntu-latest
          - flavor: standard
            arch: arm64
            runner: ubuntu-24.04-arm
          # k8s flavor — `--features kube` adds kube-rs + k8s-openapi
          # (~2 MB of crypto deps). Cargo-deb variant rewrites the
          # package name to shellfleet-agent-k8s and sets Conflicts /
          # Provides / Replaces against the standard package.
          - flavor: k8s
            arch: amd64
            runner: ubuntu-latest
          - flavor: k8s
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch submodules with PAT
        env:
          SUBMODULES_PAT: ${{ secrets.SUBMODULES_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${SUBMODULES_PAT:-}" ]; then
            git config --global \
              url."https://x-access-token:${SUBMODULES_PAT}@github.com/".insteadOf \
              "https://github.com/"
          fi
          git submodule update --init --recursive --depth 1 agent shared

      - name: Trim workspace to agent + shared
        shell: bash
        run: |
          # The root Cargo.toml lists server as a workspace member, but we
          # don't fetch the server submodule in this build. cargo metadata
          # would refuse to load. Replace the manifest with an agent-only
          # workspace just for this run; the file is restored on next
          # checkout.
          cat > Cargo.toml <<'EOF'
          [workspace]
          members = ["agent", "shared"]
          resolver = "2"
          EOF

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.flavor }}-${{ matrix.arch }}
          workspaces: |
            .
            agent

      - name: Install cargo-deb
        run: cargo install --locked cargo-deb

      - name: Compute deb revision
        id: rev
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "rev=1" >> "$GITHUB_OUTPUT"
          else
            short=$(echo "$GITHUB_SHA" | cut -c1-7)
            echo "rev=ci$(date -u +%Y%m%d%H%M).g${short}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build agent + .deb
        shell: bash
        run: |
          set -euo pipefail
          # cargo-deb infers Architecture from the host triple when no
          # --target is given. Each runner is native to its arch, so a
          # plain build produces a correct .deb for that arch.
          if [ "${{ matrix.flavor }}" = "k8s" ]; then
            cargo deb --no-strip -p agent \
              --variant k8s \
              --deb-revision "${{ steps.rev.outputs.rev }}" \
              -- --features kube
          else
            cargo deb --no-strip -p agent \
              --deb-revision "${{ steps.rev.outputs.rev }}"
          fi
          ls -la target/debian/

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: shellfleet-agent-deb-${{ matrix.flavor }}-${{ matrix.arch }}
          path: target/debian/*.deb
          if-no-files-found: error

      - name: Attach to GitHub Release (on tag/release)
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: target/debian/*.deb

  publish-repo:
    name: Publish apt repo (gh-pages)
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages (init if missing)
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: pages
        continue-on-error: true

      - name: Bootstrap gh-pages branch if absent
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d pages/.git ]; then
            mkdir -p pages
            cd pages
            git init -q -b gh-pages
            git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
            git -c user.name=ci -c user.email=ci@local commit -q --allow-empty -m "Initialize gh-pages"
          fi

      - name: Pin custom domain + landing page
        shell: bash
        run: |
          # Custom domain so the apt repo lives at shellfleet-repo.sppidy.in
          # instead of being shadowed by the user's sppidy.in portfolio.
          echo 'shellfleet-repo.sppidy.in' > pages/CNAME
          # Bypass Jekyll on GH Pages — without this it would refuse to
          # serve files under dists/ that contain leading dots etc.
          touch pages/.nojekyll
          cat > pages/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>ShellFleet apt repo</title>
          <style>body{font:14px/1.5 system-ui,sans-serif;max-width:720px;margin:3rem auto;padding:0 1rem;color:#222}code,pre{font:13px/1.5 ui-monospace,monospace;background:#f4f4f5;padding:0.1rem 0.3rem;border-radius:3px}pre{padding:1rem;overflow-x:auto}</style>
          <h1>ShellFleet apt repo</h1>
          <p>Signed apt repo, multi-arch (amd64 + arm64). Add it to your sources:</p>
          <pre>sudo install -d -m 0755 /etc/apt/keyrings
          curl -fsSL https://shellfleet-repo.sppidy.in/shellfleet.gpg \
            | sudo tee /etc/apt/keyrings/shellfleet.asc &gt; /dev/null
          echo "deb [signed-by=/etc/apt/keyrings/shellfleet.asc] https://shellfleet-repo.sppidy.in stable main" \
            | sudo tee /etc/apt/sources.list.d/shellfleet.list
          sudo apt update
          sudo apt install shellfleet-agent</pre>
          <p>Signing key fingerprint: <code>9181 1FCB AB45 B996 B40E AD1E C6E2 9AC2 52C7 4AEE</code>.</p>
          <p>See <a href="https://github.com/sppidy/shellfleet/blob/main/INSTALL.md">INSTALL.md</a> for full setup.</p>
          HTML

      - name: Download all .deb artifacts
        uses: actions/download-artifact@v8
        with:
          # No `name:` filter → grabs every artifact uploaded by the
          # build matrix. Pattern grabs both flavors and both arches
          # into a single tree, then we sort by arch below.
          pattern: shellfleet-agent-deb-*
          path: incoming
          merge-multiple: true

      - name: Refresh apt repo
        shell: bash
        run: |
          set -euo pipefail
          REPO=pages
          DIST=stable
          COMP=main
          mkdir -p "$REPO/pool/$COMP"
          mkdir -p "$REPO/dists/$DIST/$COMP/binary-amd64"
          mkdir -p "$REPO/dists/$DIST/$COMP/binary-arm64"

          # Whitelist .deb filenames before they land in the public
          # pool. The artifact step uses a fixed pattern, but a
          # compromised build job could rename a file; a name check
          # here is defense-in-depth before we commit to gh-pages.
          shopt -s nullglob
          for f in incoming/*.deb; do
            base="$(basename "$f")"
            case "$base" in
              shellfleet-agent_*_amd64.deb \
              | shellfleet-agent_*_arm64.deb \
              | shellfleet-agent-k8s_*_amd64.deb \
              | shellfleet-agent-k8s_*_arm64.deb)
                cp "$f" "$REPO/pool/$COMP/"
                ;;
              *)
                echo "::error::artifact $base does not match whitelist; aborting publish"
                exit 1
                ;;
            esac
          done

          # Trim old revisions per package + arch — keep the highest 5
          # of each so the pool doesn't grow unbounded across CI runs.
          # Both shellfleet-agent and shellfleet-agent-k8s are tracked
          # separately.
          (
            cd "$REPO/pool/$COMP"
            for pkg in shellfleet-agent shellfleet-agent-k8s; do
              for arch in amd64 arm64; do
                ls -1 ${pkg}_*_${arch}.deb 2>/dev/null \
                  | sort -V \
                  | head -n -5 \
                  | xargs -r rm -f
              done
            done
          )

          (
            cd "$REPO"
            for arch in amd64 arm64; do
              # apt-ftparchive's --arch filter restricts the Packages file
              # to .debs of the matching architecture.
              apt-ftparchive --arch "$arch" packages "pool/$COMP" \
                > "dists/$DIST/$COMP/binary-$arch/Packages"
              gzip -kf9 "dists/$DIST/$COMP/binary-$arch/Packages"
            done
            cat > /tmp/apt-ftparchive.conf <<'EOF'
          APT::FTPArchive::Release::Origin "shellfleet";
          APT::FTPArchive::Release::Label "shellfleet";
          APT::FTPArchive::Release::Suite "stable";
          APT::FTPArchive::Release::Codename "stable";
          APT::FTPArchive::Release::Components "main";
          APT::FTPArchive::Release::Architectures "amd64 arm64";
          EOF
            apt-ftparchive -c /tmp/apt-ftparchive.conf release "dists/$DIST" > "dists/$DIST/Release"
          )

      - name: Sign Release file (optional)
        # NOTE: a step-level `if:` cannot read this step's own `env:` block,
        # so the previous `env.APT_GPG_PRIVATE_KEY != ''` was ALWAYS false and
        # the repo shipped unsigned. The `secrets` context IS allowed here.
        if: ${{ secrets.APT_GPG_PRIVATE_KEY != '' }}
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        shell: bash
        run: |
          set -euo pipefail
          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/{print $5; exit}')
          gpg --batch --yes --pinentry-mode loopback \
              ${APT_GPG_PASSPHRASE:+--passphrase "$APT_GPG_PASSPHRASE"} \
              -u "$KEYID" --detach-sign --armor \
              -o pages/dists/stable/Release.gpg pages/dists/stable/Release
          gpg --batch --yes --pinentry-mode loopback \
              ${APT_GPG_PASSPHRASE:+--passphrase "$APT_GPG_PASSPHRASE"} \
              -u "$KEYID" --clearsign \
              -o pages/dists/stable/InRelease pages/dists/stable/Release
          gpg --armor --export "$KEYID" > pages/shellfleet.gpg

      - name: Commit and push gh-pages
        working-directory: pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Update apt repo: ${GITHUB_SHA::7}"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
