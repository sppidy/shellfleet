name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  linux:
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --locked --release
          strip: true
      - name: Package
        run: tar -C target/${{ matrix.target }}/release -czf shellfleet-${{ matrix.target }}.tar.gz shellfleet
      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" shellfleet-${{ matrix.target }}.tar.gz --clobber
