services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8080:8080"
    environment:
      # GitHub OAuth Configuration
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - OAUTH_REDIRECT_URL=${OAUTH_REDIRECT_URL:-https://dashboard.example.com/auth/callback}
      - UI_URL=${UI_URL:-https://dashboard.example.com/}
      - JWT_SECRET=${JWT_SECRET:-supersecretkey_change_in_production}
      # Comma-separated GitHub logins allowed to sign in. Defaults to "sppidy".
      - ALLOWED_GITHUB_USERS=${ALLOWED_GITHUB_USERS:-sppidy}
      # Optional legacy shared agent token for one-shot bootstrapping.
      # Leave unset to disable; do NOT set it to "legacy_secret_off".
      - AGENT_SECRET=${AGENT_SECRET:-}
      - TOKENS_PATH=/data/approved_tokens.json
      # Optional outbound webhook on auto-update window results.
      # Leave UPDATE_WEBHOOK_URL unset to disable. UPDATE_WEBHOOK_FORMAT is
      # "json" (default) or "slack" — Slack-shaped payload is compatible
      # with both Slack incoming webhooks and Discord webhooks.
      - UPDATE_WEBHOOK_URL=${UPDATE_WEBHOOK_URL:-}
      - UPDATE_WEBHOOK_FORMAT=${UPDATE_WEBHOOK_FORMAT:-json}
    volumes:
      - server_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - sys_manager_net

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-wss://dashboard.example.com/ui/ws}
    restart: unless-stopped
    networks:
      - sys_manager_net
    depends_on:
      - server

  # The Agent is usually deployed natively on target machines,
  # but we include it in docker-compose for local end-to-end testing.
#  agent:
#    build:
#      context: .
#      dockerfile: Dockerfile.agent
#    environment:
#      - SERVER_WS_URL=wss://dashboard.example.com/agent/ws
#    volumes:
#      # Mount the host's DBus socket to allow the containerized agent to control the host's systemd
#      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
#      # Optionally mount host's /etc to allow the config editor to see it
#      # - /etc:/etc
#    networks:
#      - sys_manager_net
#    depends_on:
#      - server

networks:
  sys_manager_net:
    driver: bridge

volumes:
  server_data:
