name: Agent k8s image

on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - "shared/**"
      - "Dockerfile.agent.k8s"
      - "helm/**"
      - ".github/workflows/agent-k8s-image.yml"
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: agent-k8s-image
  cancel-in-progress: false

env:
  REGISTRY: hrbr.sppidy.in
  IMAGE_NAME: sys-manager/agent-k8s

jobs:
  build:
    # Per-arch native build. The previous attempt at multi-arch via
    # QEMU emulation was 30+ min per run because kube-rs +
    # k8s-openapi don't compile in any reasonable time under x86 →
    # aarch64 emulation. Mirroring the .deb workflow's matrix —
    # native runners per arch — gets us back into the ~5 min budget.
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # amd64 — self-hosted on amd64-builder (the Harbor host
          # itself). Push is local via the public hostname → Traefik
          # → harbor-nginx; sub-ms RTT, no proxy overhead matters.
          - arch: amd64
            runner: [self-hosted, amd64-builder]
            platform: linux/amd64
            push_registry: hrbr.sppidy.in
            push_scheme: https
          # arm64 — self-hosted on the arm64-builder dashboard host. Both
          # arm64-builder and amd64-builder are behind NAT that doesn't
          # allow Tailscale UDP punching, so the tailnet path
          # bounces through a DERP relay (~700 KB/s, 50 ms). Pushing
          # to harbor-nginx's direct host port (192.0.2.99:18080)
          # over plain HTTP skips Traefik AND TLS overhead — small
          # win on top of the DERP cap, and timeouts no longer
          # double up across two proxies.
          - arch: arm64
            runner: [self-hosted, arm64-builder]
            platform: linux/arm64
            push_registry: hrbr.sppidy.in:18080
            push_scheme: http
    outputs:
      sha_short: ${{ steps.tags.outputs.sha_short }}
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch submodules with PAT
        env:
          SUBMODULES_PAT: ${{ secrets.SUBMODULES_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${SUBMODULES_PAT:-}" ]; then
            git config --global \
              url."https://x-access-token:${SUBMODULES_PAT}@github.com/".insteadOf \
              "https://github.com/"
          fi
          git submodule update --init --recursive --depth 1 agent shared

      # Both runners are self-hosted — amd64-builder IS Harbor,
      # arm64-builder is on the tailnet peering direct to amd64-builder.
      # Pinning /etc/hosts to HARBOR_TS_IP keeps the push off the
      # public CF path (which strips the auth `service=` param) and
      # on the local / direct-tailnet path. Idempotent across runs;
      # the duplicate-line dedupe avoids polluting /etc/hosts on a
      # long-lived runner.
      - name: Pin Harbor hostname to tailnet IP
        shell: bash
        run: |
          set -euo pipefail
          line="${{ secrets.HARBOR_TS_IP }} ${REGISTRY}"
          if ! grep -qxF "$line" /etc/hosts; then
            echo "$line" | sudo tee -a /etc/hosts
          fi
          getent hosts "${REGISTRY}"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Host network so buildkit sees the runner's /etc/hosts.
          driver-opts: |
            network=host
          # The direct-port path (arm64-builder leg) is plain HTTP, so we
          # need to mark `hrbr.sppidy.in:18080` as an insecure
          # registry for buildkit. The amd64 leg uses HTTPS so this
          # just adds an unused entry — harmless.
          buildkitd-config-inline: |
            [registry."hrbr.sppidy.in:18080"]
              http = true
              insecure = true

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ matrix.push_registry }}
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_SECRET }}

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          SHA_SHORT=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          # Each arch pushes a single arch-suffixed tag; the merge job
          # below stitches them into multi-arch tags afterwards.
          # Note that the registry portion can be a direct-port URL
          # (arm64-builder) or the public Traefik hostname (amd64-builder) —
          # Harbor stores by image name regardless, the manifest job
          # then references the canonical hostname when stitching.
          echo "tag=${{ matrix.push_registry }}/${IMAGE_NAME}:sha-${SHA_SHORT}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      - name: Build + push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.agent.k8s
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.tags.outputs.tag }}
          cache-from: type=registry,ref=${{ matrix.push_registry }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ matrix.push_registry }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.arch }},mode=max
          provenance: false
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=sys-manager-agent-k8s
            org.opencontainers.image.description=sys-manager k8s agent — kube-rs client behind the same WS protocol as the host agent

  manifest:
    name: Multi-arch manifest
    # Use the amd64-builder runner for the manifest stitch too — it's
    # local to Harbor, the imagetools API calls don't go over the
    # public path. Falls back to ubuntu-latest if no self-hosted
    # runner is available, but at that point the prior build jobs
    # would have already failed.
    needs: build
    runs-on: [self-hosted, amd64-builder]
    steps:
      - name: Pin Harbor hostname (idempotent)
        shell: bash
        run: |
          set -euo pipefail
          line="${{ secrets.HARBOR_TS_IP }} ${REGISTRY}"
          if ! grep -qxF "$line" /etc/hosts; then
            echo "$line" | sudo tee -a /etc/hosts
          fi

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host
          # Direct-port URL is plain HTTP — same insecure registry
          # config as the build legs so imagetools can read the
          # arm64 source tag.
          buildkitd-config-inline: |
            [registry."hrbr.sppidy.in:18080"]
              http = true
              insecure = true

      - name: Log in to Harbor (canonical)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_SECRET }}

      - name: Log in to Harbor (direct port)
        uses: docker/login-action@v3
        with:
          registry: hrbr.sppidy.in:18080
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_SECRET }}

      - name: Compose multi-arch tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          SHA_SHORT="${{ needs.build.outputs.sha_short }}"
          # Source tags reflect where each leg pushed:
          # amd64 via Traefik (canonical), arm64 via direct port.
          AMD="${REGISTRY}/${IMAGE_NAME}:sha-${SHA_SHORT}-amd64"
          ARM="hrbr.sppidy.in:18080/${IMAGE_NAME}:sha-${SHA_SHORT}-arm64"
          # Destination tags always use the canonical hostname so
          # consumers reference Harbor at hrbr.sppidy.in regardless
          # of how each arch got pushed.
          DEST=("${REGISTRY}/${IMAGE_NAME}:sha-${SHA_SHORT}")
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF##refs/tags/}"
            DEST+=("${REGISTRY}/${IMAGE_NAME}:${VER}")
            DEST+=("${REGISTRY}/${IMAGE_NAME}:latest")
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            DEST+=("${REGISTRY}/${IMAGE_NAME}:main")
            DEST+=("${REGISTRY}/${IMAGE_NAME}:latest")
          fi
          echo "amd=${AMD}" >> "$GITHUB_OUTPUT"
          echo "arm=${ARM}" >> "$GITHUB_OUTPUT"
          {
            echo 'dest<<EOF'
            for t in "${DEST[@]}"; do echo "$t"; done
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create + push manifest
        shell: bash
        run: |
          set -euo pipefail
          AMD='${{ steps.tags.outputs.amd }}'
          ARM='${{ steps.tags.outputs.arm }}'
          while IFS= read -r dest; do
            [ -z "$dest" ] && continue
            echo "→ ${dest}"
            docker buildx imagetools create --tag "$dest" "$AMD" "$ARM"
          done <<EOF
          ${{ steps.tags.outputs.dest }}
          EOF

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Pushed manifests"
            echo
            echo '```'
            echo "${{ steps.tags.outputs.dest }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
