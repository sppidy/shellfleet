name: Agent k8s image

on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - "shared/**"
      - "Dockerfile.agent.k8s"
      - "helm/**"
      - ".github/workflows/agent-k8s-image.yml"
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: agent-k8s-image
  cancel-in-progress: false

env:
  REGISTRY: hrbr.sppidy.in
  IMAGE_NAME: sys-manager/agent-k8s

jobs:
  build:
    # Per-arch native build. The previous attempt at multi-arch via
    # QEMU emulation was 30+ min per run because kube-rs +
    # k8s-openapi don't compile in any reasonable time under x86 →
    # aarch64 emulation. Mirroring the .deb workflow's matrix —
    # native runners per arch — gets us back into the ~5 min budget.
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    outputs:
      sha_short: ${{ steps.tags.outputs.sha_short }}
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch submodules with PAT
        env:
          SUBMODULES_PAT: ${{ secrets.SUBMODULES_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${SUBMODULES_PAT:-}" ]; then
            git config --global \
              url."https://x-access-token:${SUBMODULES_PAT}@github.com/".insteadOf \
              "https://github.com/"
          fi
          git submodule update --init --recursive --depth 1 agent shared

      # Harbor sits behind Traefik + Cloudflare. CF strips the
      # `service=` param from the WWW-Authenticate realm, which makes
      # buildkit's OAuth token fetch return 400 with "Unable to
      # handle service:". Bring up Tailscale and pin the registry
      # hostname to its tailnet IP so the push hits Harbor directly,
      # bypassing both proxies. TLS still validates because Traefik's
      # cert is for the public hostname.
      - name: Tailscale up
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_AUTHKEY }}
          oauth-secret: ${{ secrets.TS_AUTHKEY }}
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags: tag:ci
          version: latest

      - name: Pin Harbor hostname to tailnet IP
        shell: bash
        run: |
          echo "${{ secrets.HARBOR_TS_IP }} ${REGISTRY}" | sudo tee -a /etc/hosts
          getent hosts "${REGISTRY}"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Pass /etc/hosts into the buildkit container so it resolves
          # hrbr.sppidy.in to the tailnet IP just like the runner does.
          driver-opts: |
            network=host

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_SECRET }}

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          SHA_SHORT=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          # Each arch pushes a single arch-suffixed tag; the merge job
          # below stitches them into multi-arch tags afterwards.
          echo "tag=${REGISTRY}/${IMAGE_NAME}:sha-${SHA_SHORT}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      - name: Build + push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.agent.k8s
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.tags.outputs.tag }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.arch }},mode=max
          provenance: false
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=sys-manager-agent-k8s
            org.opencontainers.image.description=sys-manager k8s agent — kube-rs client behind the same WS protocol as the host agent

  manifest:
    name: Multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Tailscale up
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_AUTHKEY }}
          oauth-secret: ${{ secrets.TS_AUTHKEY }}
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags: tag:ci
          version: latest

      - name: Pin Harbor hostname to tailnet IP
        shell: bash
        run: |
          echo "${{ secrets.HARBOR_TS_IP }} ${REGISTRY}" | sudo tee -a /etc/hosts
          getent hosts "${REGISTRY}"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_SECRET }}

      - name: Compose multi-arch tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          SHA_SHORT="${{ needs.build.outputs.sha_short }}"
          AMD="${REGISTRY}/${IMAGE_NAME}:sha-${SHA_SHORT}-amd64"
          ARM="${REGISTRY}/${IMAGE_NAME}:sha-${SHA_SHORT}-arm64"
          # Always: pin to commit. main pushes also retag :main + :latest.
          # Tag releases retag :vX.Y.Z + :latest.
          DEST=("${REGISTRY}/${IMAGE_NAME}:sha-${SHA_SHORT}")
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF##refs/tags/}"
            DEST+=("${REGISTRY}/${IMAGE_NAME}:${VER}")
            DEST+=("${REGISTRY}/${IMAGE_NAME}:latest")
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            DEST+=("${REGISTRY}/${IMAGE_NAME}:main")
            DEST+=("${REGISTRY}/${IMAGE_NAME}:latest")
          fi
          echo "amd=${AMD}" >> "$GITHUB_OUTPUT"
          echo "arm=${ARM}" >> "$GITHUB_OUTPUT"
          {
            echo 'dest<<EOF'
            for t in "${DEST[@]}"; do echo "$t"; done
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create + push manifest
        shell: bash
        run: |
          set -euo pipefail
          AMD='${{ steps.tags.outputs.amd }}'
          ARM='${{ steps.tags.outputs.arm }}'
          while IFS= read -r dest; do
            [ -z "$dest" ] && continue
            echo "→ ${dest}"
            docker buildx imagetools create --tag "$dest" "$AMD" "$ARM"
          done <<EOF
          ${{ steps.tags.outputs.dest }}
          EOF

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Pushed manifests"
            echo
            echo '```'
            echo "${{ steps.tags.outputs.dest }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
