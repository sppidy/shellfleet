[package]
name = "agent"
version = "1.1.0"
edition = "2024"
description = "Agent for sys-manager: connects a host to a sys-manager server over WebSocket and exposes systemd service control, terminal, and config editing."
license = "AGPL-3.0-or-later"
repository = "https://github.com/sppidy/sys-mngr-agent"

[[bin]]
name = "sys-manager-agent"
path = "src/main.rs"

[features]
# Default build is the lean host-agent .deb. Turn on the `kube` feature
# for the sys-manager-agent-k8s package, which adds kube-rs + k8s-openapi
# (~2 MB of crypto deps) so the agent can talk to a kube-apiserver.
default = []
kube = ["dep:kube", "dep:k8s-openapi", "dep:chrono", "dep:rustls", "dep:serde_yaml"]

[dependencies]
crossbeam-channel = "0.5.15"
futures-util = "0.3.32"
hostname = "0.4.2"
portable-pty = "0.9.0"
reqwest = { version = "0.13.2", default-features = false, features = ["json", "native-tls"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
shared = { version = "0.1.0", path = "../shared" }
tokio = { version = "1.52.1", features = ["macros", "process", "rt-multi-thread", "sync"] }
tokio-tungstenite = { version = "0.29.0", features = ["native-tls"] }
url = "2.5.8"

# Optional — only compiled when `--features kube` (i.e. the
# sys-manager-agent-k8s package). Uses rustls so we don't drag a second
# TLS stack in alongside reqwest's native-tls.
chrono = { version = "0.4", default-features = false, features = ["clock"], optional = true }
kube = { version = "1.1", default-features = false, features = ["client", "rustls-tls", "ws"], optional = true }
# k8s-openapi requires a concrete v1_* feature pinning the API surface
# the binary supports. v1_32 covers k3s 1.34 / kubernetes 1.32 (current
# LTS / latest). Bump in lockstep when targeting newer clusters.
k8s-openapi = { version = "0.25", default-features = false, features = ["v1_32"], optional = true }
# rustls 0.23 requires the binary to install a process-level default
# CryptoProvider before any TLS handshake. We pin ring here and call
# `install_default()` at the top of main() when the `kube` feature is
# on; otherwise rustls panics on first apiserver call.
rustls = { version = "0.23", default-features = false, features = ["ring"], optional = true }
# YAML serialization for K8sDescribeResponse. serde_yaml is archived
# upstream but still functional and pervasive in the k8s ecosystem;
# revisit if a maintained fork (serde_yml) becomes the de-facto choice.
serde_yaml = { version = "0.9", optional = true }

# cargo-deb metadata. Used by the .github/workflows/agent-deb.yml job in the
# superproject to publish .deb packages to https://sppidy.github.io/sys-manager.
[package.metadata.deb]
name = "sys-manager-agent"
maintainer = "sppidy <sppidytg@gmail.com>"
copyright = "2026, sppidy <sppidytg@gmail.com>"
extended-description = """\
Agent for sys-manager. Connects a Linux host to a sys-manager server over a
TLS WebSocket and exposes systemd service control, an interactive terminal,
and remote read/write of configuration files. Pairing happens through the
server's device-auth flow; the resulting token is cached at
/etc/sys-manager/agent-token.txt."""
section = "admin"
priority = "optional"
depends = "$auto, systemd"
assets = [
    ["target/release/sys-manager-agent", "usr/bin/sys-manager-agent", "755"],
    ["debian/env.example", "etc/sys-manager/env.example", "644"],
    # Stock probe library. Ships under /usr/share so apt owns the
    # files; postinst symlinks them into /etc/sys-manager/probes.d/
    # so the operator can `rm` individual entries to disable them
    # without losing them on package upgrade.
    ["debian/probes.d/apt-pending-count.sh",  "usr/share/sys-manager/probes.d/apt-pending-count.sh",  "755"],
    ["debian/probes.d/disk-usage.sh",         "usr/share/sys-manager/probes.d/disk-usage.sh",         "755"],
    ["debian/probes.d/failed-services.sh",    "usr/share/sys-manager/probes.d/failed-services.sh",    "755"],
    ["debian/probes.d/swap-pressure.sh",      "usr/share/sys-manager/probes.d/swap-pressure.sh",      "755"],
    ["debian/probes.d/load-average.sh",       "usr/share/sys-manager/probes.d/load-average.sh",       "755"],
    ["debian/probes.d/docker-running.sh",     "usr/share/sys-manager/probes.d/docker-running.sh",     "755"],
    ["debian/probes.d/swarm-pending.sh",      "usr/share/sys-manager/probes.d/swarm-pending.sh",      "755"],
    ["debian/probes.d/cert-expiry-days.sh",   "usr/share/sys-manager/probes.d/cert-expiry-days.sh",   "755"],
    ["debian/probes.d/journal-errors.sh",     "usr/share/sys-manager/probes.d/journal-errors.sh",     "755"],
    ["debian/probes.d/ntp-drift.sh",          "usr/share/sys-manager/probes.d/ntp-drift.sh",          "755"],
]
maintainer-scripts = "debian"

[package.metadata.deb.systemd-units]
unit-scripts = "debian"
unit-name = "sys-manager-agent"
enable = true
start = true
restart-after-upgrade = true

# Variant: sys-manager-agent-k8s. Built with `cargo deb --variant k8s
# --features kube` in CI. Same binary path + systemd unit as the
# standard package, so the two are mutually exclusive at install time.
[package.metadata.deb.variants.k8s]
name = "sys-manager-agent-k8s"
conflicts = "sys-manager-agent"
provides = "sys-manager-agent"
replaces = "sys-manager-agent"
extended-description = """\
Agent for sys-manager — k8s flavor. Same as sys-manager-agent plus a
compiled-in kube-rs client so the agent can talk to a kube-apiserver
via in-cluster ServiceAccount or a kubeconfig at $KUBECONFIG. Install
on hosts that should appear as Kubernetes targets in the dashboard;
install plain sys-manager-agent everywhere else."""
