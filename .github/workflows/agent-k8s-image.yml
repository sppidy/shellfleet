name: Agent k8s image

on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - "shared/**"
      - "Dockerfile.agent.k8s"
      - "helm/**"
      - "agent"
      - "shared"
      - ".github/workflows/agent-k8s-image.yml"
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

concurrency:
  group: agent-k8s-image
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/shellfleet/agent-k8s

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    outputs:
      sha_short: ${{ steps.tags.outputs.sha_short }}
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch submodules with PAT
        env:
          SUBMODULES_PAT: ${{ secrets.SUBMODULES_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${SUBMODULES_PAT:-}" ]; then
            git config --global \
              url."https://x-access-token:${SUBMODULES_PAT}@github.com/".insteadOf \
              "https://github.com/"
          fi
          git submodule update --init --recursive --depth 1 agent shared

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          SHA_SHORT=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "tag=${{ env.REGISTRY }}/${IMAGE_NAME}:sha-${SHA_SHORT}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      - name: Build + push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.agent.k8s
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.tags.outputs.tag }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.arch }},mode=max
          provenance: false
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=shellfleet-agent-k8s
            org.opencontainers.image.description=ShellFleet k8s agent — kube-rs client behind the same WS protocol as the host agent

  manifest:
    name: Multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compose multi-arch tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          SHA_SHORT="${{ needs.build.outputs.sha_short }}"
          AMD="${REGISTRY}/${IMAGE_NAME}:sha-${SHA_SHORT}-amd64"
          ARM="${REGISTRY}/${IMAGE_NAME}:sha-${SHA_SHORT}-arm64"
          DEST=("${REGISTRY}/${IMAGE_NAME}:sha-${SHA_SHORT}")
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF##refs/tags/}"
            DEST+=("${REGISTRY}/${IMAGE_NAME}:${VER}")
            DEST+=("${REGISTRY}/${IMAGE_NAME}:latest")
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            DEST+=("${REGISTRY}/${IMAGE_NAME}:main")
            DEST+=("${REGISTRY}/${IMAGE_NAME}:latest")
          fi
          echo "amd=${AMD}" >> "$GITHUB_OUTPUT"
          echo "arm=${ARM}" >> "$GITHUB_OUTPUT"
          {
            echo 'dest<<EOF'
            for t in "${DEST[@]}"; do echo "$t"; done
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create + push manifest
        shell: bash
        run: |
          set -euo pipefail
          AMD='${{ steps.tags.outputs.amd }}'
          ARM='${{ steps.tags.outputs.arm }}'
          while IFS= read -r dest; do
            [ -z "$dest" ] && continue
            echo "→ ${dest}"
            docker buildx imagetools create --tag "$dest" "$AMD" "$ARM"
          done <<EOF
          ${{ steps.tags.outputs.dest }}
          EOF

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Pushed manifests"
            echo
            echo '```'
            echo "${{ steps.tags.outputs.dest }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
