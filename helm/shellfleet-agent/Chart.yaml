apiVersion: v2
name: shellfleet-agent
description: |
  In-cluster install of the ShellFleet k8s agent (`shellfleet-agent-k8s`).
  Adds the cluster as a target in the dashboard's Kubernetes tab — pods,
  deployments, services, ingresses, PVCs, events, describe, logs, and
  pod exec, all read-mostly by default.
type: application
