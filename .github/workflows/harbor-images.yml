name: Harbor multi-arch images

# Builds shellfleet-{server,web,agent} natively on amd64 + arm64 runners,
# pushes per-arch tags to Harbor over Tailscale (bypassing Cloudflare's
# 100 MB upload cap on hrbr.sppidy.in), and assembles a multi-arch
# manifest via `docker buildx imagetools create`.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. v22). Leave blank to use the git ref name."
        required: false
        default: ""
      mark_latest:
        description: "Also tag :latest"
        type: boolean
        default: true
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  HARBOR_HOST: hrbr.sppidy.in
  HARBOR_PROJECT: shellfleet
  # Tailnet IP of the registry host. Stored as a secret so the
  # public repo doesn't reveal the tailnet shape.
  HARBOR_TS_IP: ${{ secrets.HARBOR_TS_IP }}

jobs:
  build:
    name: build (${{ matrix.image }} · ${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        image: [server, web, agent]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Pick image tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            # github.ref_name on tag pushes is the tag (e.g. v22).
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_PAT }}

      - name: Tailscale up
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          # Tag the runner so your tailnet ACLs can grant it access to
          # the Harbor host. Configure the same tag on the auth key.
          tags: tag:ci

      - name: Map Harbor hostname to Tailscale IP
        run: |
          echo "${{ env.HARBOR_TS_IP }} ${{ env.HARBOR_HOST }}" | sudo tee -a /etc/hosts > /dev/null
          getent hosts ${{ env.HARBOR_HOST }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        env:
          HARBOR_USER: ${{ secrets.HARBOR_ROBOT_USER }}
          HARBOR_SECRET: ${{ secrets.HARBOR_ROBOT_SECRET }}
        run: |
          # Pass creds via env vars rather than direct workflow-expression
          # substitution into bash — the robot username contains a literal $
          # which bash would otherwise try to expand as a variable reference.
          echo "$HARBOR_SECRET" \
            | docker login "$HARBOR_HOST" -u "$HARBOR_USER" --password-stdin

      - name: Build + push (${{ matrix.platform }})
        run: |
          IMG="${{ matrix.image }}"
          TAG="${{ steps.tag.outputs.value }}"
          ARCH="${{ matrix.arch }}"
          docker buildx build \
            --platform ${{ matrix.platform }} \
            -f Dockerfile.${IMG} \
            -t ${{ env.HARBOR_HOST }}/${{ env.HARBOR_PROJECT }}/${IMG}:${TAG}-${ARCH} \
            --provenance false \
            --push .

  manifest:
    name: assemble manifest (${{ matrix.image }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [server, web, agent]
    steps:
      - name: Pick image tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Tailscale up
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags: tag:ci

      - name: Map Harbor hostname to Tailscale IP
        run: |
          echo "${{ env.HARBOR_TS_IP }} ${{ env.HARBOR_HOST }}" | sudo tee -a /etc/hosts > /dev/null

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        env:
          HARBOR_USER: ${{ secrets.HARBOR_ROBOT_USER }}
          HARBOR_SECRET: ${{ secrets.HARBOR_ROBOT_SECRET }}
        run: |
          # Pass creds via env vars rather than direct workflow-expression
          # substitution into bash — the robot username contains a literal $
          # which bash would otherwise try to expand as a variable reference.
          echo "$HARBOR_SECRET" \
            | docker login "$HARBOR_HOST" -u "$HARBOR_USER" --password-stdin

      - name: Build manifest list (${{ steps.tag.outputs.value }})
        run: |
          IMG="${{ matrix.image }}"
          TAG="${{ steps.tag.outputs.value }}"
          BASE="${{ env.HARBOR_HOST }}/${{ env.HARBOR_PROJECT }}/${IMG}"
          docker buildx imagetools create \
            -t "${BASE}:${TAG}" \
            "${BASE}:${TAG}-amd64" \
            "${BASE}:${TAG}-arm64"

      - name: Also tag :latest
        if: ${{ inputs.mark_latest != false }}
        run: |
          IMG="${{ matrix.image }}"
          TAG="${{ steps.tag.outputs.value }}"
          BASE="${{ env.HARBOR_HOST }}/${{ env.HARBOR_PROJECT }}/${IMG}"
          docker buildx imagetools create \
            -t "${BASE}:latest" \
            "${BASE}:${TAG}-amd64" \
            "${BASE}:${TAG}-arm64"
