version: 2
# Cargo deps are intentionally NOT managed here. This crate is a member of a
# cargo workspace whose Cargo.lock lives in the superproject (sppidy/shellfleet);
# standalone it has no lockfile for dependabot's cargo updater to resolve, so it
# errored. Cargo updates are handled at the superproject; only github-actions
# is kept here.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
