apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shellfleet-agent.fullname" . }}
  labels:
    {{- include "shellfleet-agent.labels" . | nindent 4 }}
spec:
  # Singleton — multi-replica gives no benefit, the agent multiplexes
  # requests on a single WS connection back to the dashboard.
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "shellfleet-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shellfleet-agent.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      # Stable hostname so the agent's hostname-derived agent_id
      # doesn't change on every Pod recreate (default would be the
      # mutable pod name with the deployment hash). Lets a fixed
      # Prometheus `instance` label, ShellFleet UI bookmarks, and
      # any cross-references in the dashboard survive rollouts.
      hostname: {{ include "shellfleet-agent.fullname" . }}
      subdomain: {{ include "shellfleet-agent.fullname" . }}
      serviceAccountName: {{ include "shellfleet-agent.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Pod-level securityContext. fsGroup makes the emptyDir at
      # /etc/shellfleet owned by `runAsGroup` so the non-root agent
      # can write its pairing token there. Override per-deploy via
      # `.Values.podSecurityContext`.
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: SERVER_API_URL
              value: {{ .Values.server.apiUrl | quote }}
            - name: SERVER_WS_URL
              value: {{ .Values.server.wsUrl | quote }}
            {{- if .Values.mtls.existingSecret }}
            # Agent↔server mutual TLS. The agent presents its client
            # cert and pins the server CA, so a DNS-hijack / CA compromise
            # can't impersonate the server to this agent.
            - name: AGENT_MTLS_CERT_PATH
              value: /etc/shellfleet/mtls/agent.crt
            - name: AGENT_MTLS_KEY_PATH
              value: /etc/shellfleet/mtls/agent.key
            - name: SERVER_TLS_CA_PATH
              value: /etc/shellfleet/mtls/server-ca.crt
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            # Writable scratch over /etc/shellfleet. With
            # readOnlyRootFilesystem: true the rest of the rootfs
            # is read-only; this is where device-auth pairing
            # writes the issued bearer token (lost on Pod restart
            # unless promoted into a Secret + existingSecret).
            - name: agent-state
              mountPath: /etc/shellfleet
            {{- if .Values.token.existingSecret }}
            - name: agent-token
              mountPath: /etc/shellfleet/agent-token.txt
              subPath: agent-token.txt
              readOnly: true
            {{- end }}
            {{- if .Values.mtls.existingSecret }}
            # Agent client cert + key + server CA for mutual TLS.
            - name: agent-mtls
              mountPath: /etc/shellfleet/mtls
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # Container-level securityContext. Together with the
          # Pod-level one above this drops to a non-root,
          # capabilities-stripped, read-only-rootfs posture by
          # default. Override per-deploy via
          # `.Values.containerSecurityContext`.
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
      volumes:
        - name: agent-state
          emptyDir: {}
        {{- if .Values.token.existingSecret }}
        - name: agent-token
          secret:
            secretName: {{ .Values.token.existingSecret }}
            items:
              - key: agent-token.txt
                path: agent-token.txt
                mode: 0400
        {{- end }}
        {{- if .Values.mtls.existingSecret }}
        - name: agent-mtls
          secret:
            secretName: {{ .Values.mtls.existingSecret }}
            items:
              - key: agent.crt
                path: agent.crt
                mode: 0400
              - key: agent.key
                path: agent.key
                mode: 0400
              - key: server-ca.crt
                path: server-ca.crt
                mode: 0400
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
